name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push App Image
        run: |
          docker build -t webapp ./app
          docker tag webapp:latest 471112776853.dkr.ecr.us-east-1.amazonaws.com/clo835-webapp:latest
          docker push 471112776853.dkr.ecr.us-east-1.amazonaws.com/clo835-webapp:latest

      - name: Build, Tag, and Push MySQL Image
        run: |
          docker build -t mysqlapp -f ./app/Dockerfile_mysql ./app
          docker tag mysqlapp:latest 471112776853.dkr.ecr.us-east-1.amazonaws.com/clo835-mysql:latest
          docker push 471112776853.dkr.ecr.us-east-1.amazonaws.com/clo835-mysql:latest
